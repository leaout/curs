name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes pycodestyle
          
      - name: Run pyflakes
        run: |
          pyflakes web/ test/test_config.py test/test_task_scheduler.py test/test_task_callbacks.py
          
      - name: Run pycodestyle
        run: |
          pycodestyle --ignore=E501,W503 curs/ web/