name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          
      - name: Run tests with pytest
        run: |
          python -m pytest test/test_config.py test/test_task_scheduler.py test/test_task_callbacks.py -v --cov=curs --cov-report=xml --cov-report=term
        env:
          CURS_DB_HOST: localhost
          CURS_DB_PORT: 5432
          CURS_DB_NAME: curs_test
          CURS_DB_USER: postgres
          CURS_DB_PASSWORD: test